<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Staff Tasks | Resort System</title>
  <link rel="stylesheet" href="/css/staff-dashboard.css">
</head>
<body>

  <div class="dashboard-container">
<aside class="sidebar">
      <h2>Staff Panel</h2>
      <ul class="menu">
        <li class="active" id="menu-pending" onclick="switchTab('pending')">งานของฉัน (My Tasks)</li>
        <li id="menu-completed" onclick="switchTab('completed')">งานที่ทำเสร็จแล้ว</li>
        <li id="menu-checkout" onclick="switchTab('checkout')">🏁 Check Out</li>
      </ul>
      <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
    </aside>

    <main class="main-content">
      <header>
        <h1>ตารางงานพนักงาน (Tasks)</h1>
        <p id="pageSubtitle">รายการงานที่ต้องดำเนินการประจำวัน</p>
      </header>
      
      <section class="table-container" id="taskSection">
        <table>
          <thead>
            <tr>
              <th>รหัสงาน</th>
              <th>รายละเอียด / ห้อง</th>
              <th>กำหนดเวลา</th>
              <th>สถานะ</th>
              <th>อัปเดตงาน</th>
            </tr>
          </thead>
          <tbody id="taskTable">
            <tr>
              <td colspan="6" style="text-align: center;">กำลังโหลดข้อมูลงาน...</td>
            </tr>
          </tbody>
        </table>
      </section>

       <!-- Checkout Table (hidden by default) -->
      <section class="table-container" id="checkoutSection" style="display:none;">
        <table>
          <thead>
            <tr>
              <th>รหัสการจอง</th>
              <th>ห้อง</th>
              <th>ผู้เข้าพัก</th>
              <th>Check-in</th>
              <th>Check-out (กำหนด)</th>
              <th>ดำเนินการ</th>
            </tr>
          </thead>
          <tbody id="checkoutTable">
            <tr>
              <td colspan="6" style="text-align: center;">กำลังโหลดข้อมูล...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="/js/staff-dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Booking</title>
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/booking.css">
</head>
<body>

<header class="top-bar">
  <div class="logo">
    <img src="/assets/IMG/Bg_login1.jpg">
  </div>
    <div class="login" id="authArea"></div>
  </div>
</header>
<body>
<div class="booking-box">

  <div id="roomSummary" class="room-summary"></div>

  <h2>จองห้องพัก</h2>

  <!-- Datepicker -->
  <div class="date-picker">
    <label>ช่วงวันที่ต้องการดู</label>
    <input type="date" id="rangeStart">
    <input type="date" id="rangeEnd">
  </div>

  <!-- Calendar -->
  <div class="calendar-wrapper">
    <div id="calendar-header"></div>
    <div id="calendar-weekdays"></div>
    <div id="calendar"></div>
  </div>
  
  <div class="people-select">
    <label>จำนวนผู้เข้าพัก</label>
    <input
      type="number"
      id="numPeople"
      min="1"
      max="2"
      value="1"
    >
    <span>คน</span>
  </div>

  <!-- Services -->
  <h3>บริการเสริม</h3>
  <div id="services"></div>
  <h3>สรุปรายละเอียดการจอง</h3>
  <div id="bookingSummary" class="booking-summary">
    <p>เลือกวันที่และบริการเพื่อดูราคารวม</p>
  </div>

  <button onclick="confirmBooking()">ยืนยันการจอง</button>
</div>

<script src="/js/booking.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จองห้องพัก | Resort</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/booking.css">
</head>
<body>

<!-- TOP BAR (reuse home.css styles) -->
<header class="top-bar">
  <div class="logo">
    <img src="/assets/IMG/Bg_login1.jpg" alt="Resort Logo">
    </div>
  </div>
  <div class="login" id="authArea"></div>
</header>

<!-- BOOKING CONTENT -->
<div class="booking-box">

  <!-- Room summary (JS renders gallery + detail here) -->
  <div id="roomSummary" class="room-summary"></div>

  <h2>จองห้องพัก</h2>

  <!-- Date range picker -->
  <div class="date-picker">
    <label>ช่วงวันที่ต้องการดู</label>
    <input type="date" id="rangeStart">
    <input type="date" id="rangeEnd">
  </div>

  <!-- Calendar -->
  <div class="calendar-wrapper">
    <div id="calendar-header"></div>
    <div id="calendar-weekdays"></div>
    <div id="calendar"></div>
    <div class="cal-legend">
      <span><div class="dot dot-avail"></div> ว่าง</span>
      <span><div class="dot dot-unavail"></div> ไม่ว่าง</span>
      <span><div class="dot dot-sel"></div> เลือกแล้ว</span>
      <span><div class="dot dot-range"></div> ช่วงที่เลือก</span>
    </div>
  </div>

  <!-- People -->
  <div class="people-select">
    <label>จำนวนผู้เข้าพัก</label>
    <input type="number" id="numPeople" min="1" max="2" value="1">
    <span>ท่าน</span>
  </div>

  <!-- Services -->
  <h3>บริการเสริม</h3>
  <div id="services"></div>

  <!-- Summary -->
  <h3>สรุปรายละเอียดการจอง</h3>
  <div id="bookingSummary" class="booking-summary">
    <p>เลือกวันที่และบริการเพื่อดูราคารวม</p>
  </div>

  <button onclick="confirmBooking()">ยืนยันการจอง</button>

</div>

<script src="/js/booking.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ยืนยัน OTP</title>
  <link rel="stylesheet" href="/css/otp.css">
</head>
<body>

<div class="otp-box">
  <h2>ยืนยันการจอง</h2>
  <p>ขอรหัส OTP ใหม่ภายใน</p>
  <h3 id="timer">02:00</h3>

  <input
    type="text"
    id="otp"
    maxlength="6"
    placeholder="กรอกรหัส OTP"
  >
  <p class="warning-text">กรุณายืนยันภายใน 15 นาที มิเช่นนั้นรายการจองจะถูกยกเลิกอัตโนมัติ</p>
  <button onclick="verifyOtp()">ยืนยัน</button>
  <button id="resendBtn" onclick="resendOtp()" disabled>
    ขอ OTP ใหม่
  </button>

  <p id="msg" class="msg"></p>
</div>

<script src="/js/otp.js"></script>
</body>
</html>
